services:
  mysql:
    image: mysql:8.0.46

    container_name: sql-data-warehouse

    restart: unless-stopped
    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: MufeedKcp
      MYSQL_PASSWORD: MufeedKcp12345

    command:
      - --secure-file-priv=

    volumes:
      # SQL initialization scripts
      - ./scripts:/docker-entrypoint-initdb.d:ro
      # Raw datasets
      - ./datasets:/datasets:ro
      # Persistent database storage
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
